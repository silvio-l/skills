<!doctype html>
<html lang="de">
  <head><title>Veralteter Schema-Typ</title></head>
  <body>
    <h1>Seite mit veraltetem Schema-Typ</h1>
    <p>Diese Seite verwendet den veralteten Schema.org-Typ WPFooter.</p>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WPFooter",
      "name": "Seitenfuß"
    }
    </script>
  </body>
</html>
