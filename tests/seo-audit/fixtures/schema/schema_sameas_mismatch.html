<!doctype html>
<html lang="de">
  <head><title>SameAs-Widerspruch</title></head>
  <body>
    <h1>Muster GmbH</h1>
    <p>Wir sind auch auf Twitter aktiv.</p>
    <a href="https://twitter.com/mustergmbh">Twitter</a>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Muster GmbH",
      "url": "https://muster.de",
      "sameAs": [
        "https://twitter.com/mustergmbh",
        "https://facebook.com/mustergmbh_nicht_verlinkt"
      ]
    }
    </script>
  </body>
</html>
